# Scheme category taxonomy (SEBI classification)
categories:
  equity:
    subcategories: ["large_cap", "mid_cap", "small_cap", "multi_cap", "flexi_cap", "large_mid_cap", "focused", "elss", "value", "contra", "dividend_yield", "sectoral", "thematic"]
  debt:
    subcategories: ["overnight", "liquid", "ultra_short", "low_duration", "money_market", "short_duration", "medium_duration", "medium_long", "long_duration", "dynamic_bond", "corporate_bond", "credit_risk", "banking_psu", "gilt", "gilt_10yr", "floater"]
  hybrid:
    subcategories: ["conservative", "balanced", "aggressive", "dynamic_asset_allocation", "multi_asset", "arbitrage", "equity_savings"]
  solution_oriented:
    subcategories: ["retirement", "children"]
  other:
    subcategories: ["index", "etf", "fof"]

